<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Čistič CSV — Gubi</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f6f5f2;
  --surface: #ffffff;
  --surface-2: #f0efe9;
  --border: #e2e0d8;
  --border-strong: #c8c5bb;
  --text: #1a1917;
  --text-secondary: #6b6860;
  --text-muted: #9c9a93;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --accent-bg: #eff6ff;
  --danger: #dc2626;
  --danger-bg: #fef2f2;
  --danger-border: #fecaca;
  --warning: #b45309;
  --warning-bg: #fffbeb;
  --warning-border: #fde68a;
  --success: #16a34a;
  --success-bg: #f0fdf4;
  --success-border: #bbf7d0;
  --radius: 8px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #18181a; --surface: #242426; --surface-2: #2e2e30;
    --border: #3a3a3c; --border-strong: #4a4a4c;
    --text: #f2f1ed; --text-secondary: #a8a7a2; --text-muted: #6b6a66;
    --accent: #60a5fa; --accent-hover: #93c5fd; --accent-bg: #172554;
    --danger: #f87171; --danger-bg: #450a0a; --danger-border: #7f1d1d;
    --warning: #fbbf24; --warning-bg: #451a03; --warning-border: #78350f;
    --success: #4ade80; --success-bg: #052e16; --success-border: #14532d;
  }
}

body {
  font-family: var(--font);
  font-size: 15px;
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;
}

/* ── Layout ── */
.app { display: flex; flex-direction: column; min-height: 100vh; }

nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}
.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 600;
  font-size: 15px;
}
.nav-brand .logo {
  width: 28px; height: 28px;
  background: var(--text);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.nav-brand .logo svg { width: 16px; height: 16px; fill: var(--bg); }
.nav-brand .subtitle {
  font-size: 12px;
  font-weight: 400;
  color: var(--text-muted);
  margin-left: 2px;
}

.nav-right { display: flex; align-items: center; gap: 12px; }

.avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  object-fit: cover;
  border: 1.5px solid var(--border);
}
.avatar-placeholder {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--surface-2);
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
}
.user-name { font-size: 13px; color: var(--text-secondary); }

main { flex: 1; max-width: 760px; margin: 0 auto; width: 100%; padding: 2rem 1rem; }

/* ── Login screen ── */
#login-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 56px);
  text-align: center;
  padding: 2rem;
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 3rem 2.5rem;
  max-width: 380px;
  width: 100%;
}
.login-icon {
  width: 56px; height: 56px;
  background: var(--text);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1.5rem;
}
.login-icon svg { width: 30px; height: 30px; fill: var(--bg); }
.login-card h1 { font-size: 20px; font-weight: 600; margin-bottom: 0.5rem; }
.login-card p { font-size: 14px; color: var(--text-secondary); margin-bottom: 2rem; line-height: 1.6; }

/* ── App screen ── */
#app-screen { display: none; }

/* ── Drop zone ── */
.drop-zone {
  border: 1.5px dashed var(--border-strong);
  border-radius: 12px;
  padding: 3rem 2rem;
  text-align: center;
  cursor: pointer;
  background: var(--surface);
  transition: background 0.15s, border-color 0.15s;
  margin-bottom: 1.5rem;
}
.drop-zone:hover, .drop-zone.drag-over {
  background: var(--accent-bg);
  border-color: var(--accent);
}
.drop-zone svg { width: 40px; height: 40px; color: var(--text-muted); margin-bottom: 1rem; }
.drop-zone .primary { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
.drop-zone .secondary { font-size: 13px; color: var(--text-secondary); }

/* ── History ── */
.history-section { margin-top: 2rem; }
.section-label {
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.75rem;
}
.history-item {
  display: flex; align-items: center; gap: 12px;
  padding: 0.75rem 1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 0.5rem;
  font-size: 13px;
}
.history-item .hi-icon { color: var(--text-muted); flex-shrink: 0; }
.history-item .hi-icon svg { width: 16px; height: 16px; display: block; }
.history-item .hi-name { flex: 1; font-weight: 500; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.history-item .hi-meta { color: var(--text-muted); white-space: nowrap; }
.history-item .hi-link { color: var(--accent); text-decoration: none; white-space: nowrap; font-size: 12px; }
.history-item .hi-link:hover { text-decoration: underline; }

/* ── Results ── */
#result { display: none; margin-bottom: 2rem; }

.file-name {
  font-weight: 500; display: flex; align-items: center;
  gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap;
}
.file-name svg { width: 18px; height: 18px; color: var(--text-secondary); }

.stats {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px; margin-bottom: 1.5rem;
}
.stat {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1rem; text-align: center;
}
.stat .num { font-size: 26px; font-weight: 600; line-height: 1; }
.stat .lbl { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
.stat.danger .num  { color: var(--danger); }
.stat.warning .num { color: var(--warning); }
.stat.success .num { color: var(--success); }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
.card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
.card-header .title { font-weight: 500; font-size: 14px; flex: 1; }

.badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
.badge-danger  { background: var(--danger-bg);  color: var(--danger);  border: 1px solid var(--danger-border); }
.badge-warning { background: var(--warning-bg); color: var(--warning); border: 1px solid var(--warning-border); }
.badge-success { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }
.badge-neutral { background: var(--surface-2);  color: var(--text-secondary); border: 1px solid var(--border); }

.issue-row { display: flex; align-items: flex-start; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.4; }
.issue-row:last-child { border-bottom: none; padding-bottom: 0; }
.row-num  { color: var(--text-muted); min-width: 40px; font-size: 11px; padding-top: 2px; font-family: var(--mono); }
.old-val  { font-family: var(--mono); color: var(--danger); word-break: break-all; }
.arrow    { color: var(--text-muted); padding-top: 2px; flex-shrink: 0; }
.new-val  { font-family: var(--mono); color: var(--success); word-break: break-all; }
.desc-val { color: var(--text-secondary); flex: 1; }
.more { font-size: 12px; color: var(--text-muted); padding: 6px 0 0; }

.info-box { background: var(--warning-bg); border: 1px solid var(--warning-border); border-radius: var(--radius); padding: 0.75rem 1rem; font-size: 13px; color: var(--warning); margin-bottom: 1.25rem; display: flex; gap: 8px; align-items: flex-start; }
.info-box svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }

.success-state { text-align: center; padding: 2rem; }
.success-state svg { width: 36px; height: 36px; color: var(--success); margin-bottom: 0.75rem; }
.success-state p { color: var(--text-secondary); font-size: 14px; }

.actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 1.5rem; }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 0.6rem 1.25rem; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; border: none; text-decoration: none; transition: background 0.1s, opacity 0.1s; }
.btn svg { width: 16px; height: 16px; flex-shrink: 0; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
.btn-gdrive { background: #1a73e8; color: #fff; }
.btn-gdrive:hover:not(:disabled) { background: #1557b0; }
.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border-strong); }
.btn-secondary:hover { background: var(--surface-2); }
.btn-google {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 0.7rem 1.5rem;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  font-size: 14px; font-weight: 500;
  cursor: pointer;
  width: 100%;
  justify-content: center;
  transition: background 0.1s;
}
.btn-google:hover { background: var(--surface-2); }
.btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

.btn-logout { font-size: 13px; color: var(--text-muted); background: none; border: none; cursor: pointer; padding: 0; }
.btn-logout:hover { color: var(--danger); }

.drive-status { font-size: 13px; color: var(--text-secondary); margin-top: 0.75rem; min-height: 1.2em; }
.drive-status.ok  { color: var(--success); }
.drive-status.err { color: var(--danger); }

@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 0.8s linear infinite; display: inline-block; }

@media (max-width: 520px) {
  nav { padding: 0 1rem; }
  .stats { grid-template-columns: repeat(2, 1fr); }
  .user-name { display: none; }
}
</style>
</head>
<body>
<div class="app">

  <!-- Nav -->
  <nav>
    <div class="nav-brand">
      <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM8 13h8v1.5H8V13zm0 3h5v1.5H8V16zm0-6h3v1.5H8V10z"/></svg>
      </div>
      Čistič CSV
      <span class="subtitle">/ Gubi</span>
    </div>
    <div class="nav-right" id="nav-user" style="display:none">
      <span class="user-name" id="user-name-el"></span>
      <img class="avatar" id="user-avatar" src="" alt="" style="display:none">
      <div class="avatar-placeholder" id="user-initials"></div>
      <button class="btn-logout" id="btn-logout" title="Odhlásit se">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
          <path d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- Login screen -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM8 13h8v1.5H8V13zm0 3h5v1.5H8V16zm0-6h3v1.5H8V10z"/></svg>
      </div>
      <h1>Čistič CSV</h1>
      <p>Nástroj pro opravu exportů z databáze Gubi. Přihlaste se svým Google účtem pro přístup k nahrávání na Drive.</p>
      <button class="btn-google" id="btn-login">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Přihlásit se přes Google
      </button>
    </div>
  </div>

  <!-- App screen -->
  <div id="app-screen">
    <main>

      <!-- Drop zone -->
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 16v1a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-1M12 12V4m0 0L8 8m4-4 4 4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <p class="primary">Přetáhněte CSV soubor sem</p>
        <p class="secondary">nebo klikněte pro výběr ze složky · pouze soubory .csv</p>
      </div>
      <input type="file" id="file-input" accept=".csv" style="display:none">

      <!-- Result -->
      <div id="result"></div>

      <!-- History -->
      <div class="history-section" id="history-section" style="display:none">
        <div class="section-label">Nedávno zpracované soubory</div>
        <div id="history-list"></div>
      </div>

    </main>
  </div>

</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const CLIENT_ID = '176587743875-o23t1ueacgcp0p97lkhjjbcov5913g7s.apps.googleusercontent.com';
const SCOPE = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.profile';
const HISTORY_KEY = 'csv_cleaner_history';

const PHONE_COL = 'TELEFON';
const NAME_COLS  = ['PRIJMENI', 'JMENO'];
const EMAIL_COL  = 'EMAIL';

let _token = null;
let _tokenClient = null;
let _user = null;
let _pendingAction = null;

/* ── Google Identity ── */
function initGsi() {
  if (!window.google) { setTimeout(initGsi, 300); return; }
  _tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPE,
    callback: async (resp) => {
      if (resp.error) { console.error(resp.error); return; }
      _token = resp.access_token;
      await loadUserInfo();
      showApp();
      if (_pendingAction) { const fn = _pendingAction; _pendingAction = null; fn(); }
    }
  });
  // Auto-restore session hint
  const hint = localStorage.getItem('google_email_hint');
  if (hint) silentLogin(hint);
}
window.addEventListener('load', initGsi);

async function silentLogin(hint) {
  // Try to get token silently (no prompt) — works if session is fresh
  if (!_tokenClient) return;
  _tokenClient.requestAccessToken({ prompt: '', login_hint: hint });
}

document.getElementById('btn-login').onclick = () => {
  if (!_tokenClient) return;
  _tokenClient.requestAccessToken({ prompt: 'consent' });
};

document.getElementById('btn-logout').onclick = () => {
  if (_token) google.accounts.oauth2.revoke(_token);
  _token = null; _user = null;
  localStorage.removeItem('google_email_hint');
  showLogin();
};

async function loadUserInfo() {
  const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers: { Authorization: 'Bearer ' + _token }
  });
  _user = await r.json();
  localStorage.setItem('google_email_hint', _user.email || '');
  renderNav();
}

function renderNav() {
  if (!_user) return;
  document.getElementById('user-name-el').textContent = _user.given_name || _user.name || '';
  const avatar = document.getElementById('user-avatar');
  const initials = document.getElementById('user-initials');
  if (_user.picture) {
    avatar.src = _user.picture;
    avatar.style.display = 'block';
    initials.style.display = 'none';
  } else {
    const name = (_user.name || '?');
    initials.textContent = name.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    initials.style.display = 'flex';
  }
  document.getElementById('nav-user').style.display = 'flex';
}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('nav-user').style.display = 'none';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  renderHistory();
}

/* ── CSV ── */
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (!lines.length) return { headers: [], rows: [], sep: ';' };
  const sep = lines[0].includes(';') ? ';' : ',';
  function splitLine(line) {
    const result = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"' && !inQ) { inQ = true; continue; }
      if (ch === '"' && inQ) { if (line[i+1]==='"'){cur+='"';i++;}else inQ=false; continue; }
      if (ch === sep && !inQ) { result.push(cur); cur=''; continue; }
      cur += ch;
    }
    result.push(cur);
    return result;
  }
  const headers = splitLine(lines[0]);
  const rows = lines.slice(1).map((l,i) => {
    const vals = splitLine(l);
    const obj = { __row: i+2 };
    headers.forEach((h,j) => { obj[h] = vals[j]!==undefined ? vals[j] : ''; });
    return obj;
  });
  return { headers, rows, sep };
}

function toCSV(headers, rows, sep) {
  const esc = v => {
    if (v===null||v===undefined) return '';
    const s = String(v);
    return (s.includes(sep)||s.includes('"')||s.includes('\n')) ? `"${s.replace(/"/g,'""')}"` : s;
  };
  return [headers.map(esc).join(sep), ...rows.map(r=>headers.map(h=>esc(r[h]??'')).join(sep))].join('\r\n');
}

function process(headers, rows) {
  const issues = []; const fixed = rows.map(r=>({...r}));

  if (headers.includes(PHONE_COL)) {
    rows.forEach((r,i) => {
      const val = String(r[PHONE_COL]||'');
      if (/[a-zA-Z\-]/.test(val) && val) {
        const cleaned = val.replace(/[a-zA-Z\-]/g,'').trim();
        issues.push({row:r.__row,type:'phone',sev:'danger',old:val,new:cleaned});
        fixed[i][PHONE_COL] = cleaned;
      }
    });
  }

  const seen = new Map(); const dupeIdx = new Set();
  rows.forEach((r,i) => {
    const key = NAME_COLS.map(c=>(r[c]||'').trim().toLowerCase()).join('|')+'|'+(r[EMAIL_COL]||'').trim().toLowerCase();
    if (seen.has(key)) {
      dupeIdx.add(i);
      issues.push({row:r.__row,type:'dupe',sev:'danger',old:`${r['PRIJMENI']||''} ${r['JMENO']||''} <${r[EMAIL_COL]||''}>`,new:'(odstraněn)'});
    } else seen.set(key,i);
  });

  const emailMap = new Map();
  rows.forEach(r => {
    const e=(r[EMAIL_COL]||'').trim().toLowerCase(); if(!e) return;
    if(!emailMap.has(e)) emailMap.set(e,[]);
    emailMap.get(e).push({row:r.__row,name:`${r['PRIJMENI']||''} ${r['JMENO']||''}`.trim()});
  });
  emailMap.forEach((entries,email) => {
    if(entries.length>1){
      const allDupe=entries.every(e=>dupeIdx.has(rows.findIndex(r=>r.__row===e.row)));
      if(!allDupe) issues.push({row:entries.map(e=>e.row).join(', '),type:'shared',sev:'warning',old:email,new:entries.map(e=>e.name).join(', ')});
    }
  });

  rows.forEach(r => {
    if(!(r[EMAIL_COL]||'').trim()) issues.push({row:r.__row,type:'no-email',sev:'warning',old:'(prázdné)',new:null,name:`${r['PRIJMENI']||''} ${r['JMENO']||''}`.trim()});
  });
  if(headers.includes(PHONE_COL)){
    rows.forEach(r => {
      if(!(r[PHONE_COL]||'').trim()) issues.push({row:r.__row,type:'no-phone',sev:'warning',old:'(prázdné)',new:null,name:`${r['PRIJMENI']||''} ${r['JMENO']||''}`.trim()});
    });
  }
  if(headers.includes('PLATCE')){
    rows.forEach(r => {
      if(r['PLATCE']==='?') issues.push({row:r.__row,type:'platce',sev:'warning',old:'?',new:null,name:`${r['PRIJMENI']||''} ${r['JMENO']||''}`.trim()});
    });
  }

  return {issues, fixedRows: fixed.filter((_,i)=>!dupeIdx.has(i))};
}

/* ── Drive upload ── */
async function uploadToDrive(csvContent, fileName) {
  const btn = document.getElementById('btn-gdrive');
  const status = document.getElementById('drive-status');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin">↻</span> Nahrávám…';}
  if(status){status.className='drive-status';status.textContent='Nahrávám na Google Drive…';}

  const name = fileName.replace(/\.csv$/i,'')+'_opraveno.csv';
  const meta = JSON.stringify({name, mimeType:'text/csv'});
  const blob = new Blob(['\uFEFF'+csvContent],{type:'text/csv;charset=utf-8'});
  const form = new FormData();
  form.append('metadata', new Blob([meta],{type:'application/json'}));
  form.append('file', blob);

  try {
    const resp = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
      {method:'POST', headers:{Authorization:'Bearer '+_token}, body:form});
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const data = await resp.json();
    const link = `https://drive.google.com/file/d/${data.id}/view`;
    if(status){
      status.className='drive-status ok';
      status.innerHTML = `Nahráno na Drive: <a href="${link}" target="_blank" style="color:inherit;text-decoration:underline">${escH(name)}</a>`;
    }
    // Save to history
    saveHistory({name, driveId: data.id, link, date: new Date().toISOString()});
    renderHistory();
  } catch(e) {
    if(status){status.className='drive-status err';status.textContent='Chyba: '+e.message;}
  } finally {
    if(btn){btn.disabled=false;btn.innerHTML=driveIconHTML()+' Uložit na Google Drive';}
  }
}

    <path d="M6.6 66.85l3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3L27.5 53H0c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/>

    <path d="M73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5H59.8l5.85 11.5z" fill="#ea4335"/>
    <path d="M43.65 25L57.4 1.2C56.05.4 54.5 0 52.9 0H34.4c-1.6 0-3.1.45-4.5 1.2z" fill="#00832d"/>

}

/* ── History (localStorage) ── */
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]'); } catch { return []; }
}
function saveHistory(entry) {
  const hist = loadHistory();
  hist.unshift(entry);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(hist.slice(0,10)));
}
function renderHistory() {
  const hist = loadHistory();
  const section = document.getElementById('history-section');
  const list = document.getElementById('history-list');
  if(!hist.length){section.style.display='none';return;}
  section.style.display='block';
  list.innerHTML = hist.map(h => {
    const d = new Date(h.date);
    const dateStr = d.toLocaleDateString('cs-CZ',{day:'numeric',month:'short'}) + ' ' + d.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});
    return `<div class="history-item">
      <span class="hi-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.586a1 1 0 0 1 .707.293l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2z" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      <span class="hi-name">${escH(h.name)}</span>
      <span class="hi-meta">${dateStr}</span>
      <a class="hi-link" href="${h.link}" target="_blank">Otevřít ↗</a>
    </div>`;
  }).join('');
}

/* ── Render result ── */
function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderGroup(type, items) {
  const meta = {
    phone:      {label:'Text v telefonním čísle', sev:'danger',  fixed:true},
    dupe:       {label:'Přesné duplikáty',         sev:'danger',  fixed:true},
    shared:     {label:'Sdílené e-mailové adresy', sev:'warning', fixed:false},
    'no-email': {label:'Chybějící e-mail',         sev:'warning', fixed:false},
    'no-phone': {label:'Chybějící telefon',        sev:'warning', fixed:false},
    platce:     {label:'Neznámý plátce (?)',       sev:'warning', fixed:false},
  }[type]||{label:type,sev:'warning',fixed:false};

  const badgeCls = meta.sev==='danger'?'badge-danger':'badge-warning';
  const fixTag = meta.fixed
    ? '<span class="badge badge-success">automaticky opraveno</span>'
    : '<span class="badge badge-neutral">ruční kontrola</span>';

  let rows_html='';
  if(type==='phone'||type==='dupe'){
    rows_html=items.map(i=>`<div class="issue-row"><span class="row-num">ř.&nbsp;${escH(i.row)}</span><span class="old-val">${escH(i.old)}</span><span class="arrow">→</span><span class="new-val">${escH(i.new)}</span></div>`).join('');
  } else if(type==='shared'){
    rows_html=items.map(i=>`<div class="issue-row"><span class="row-num">ř.&nbsp;${escH(i.row)}</span><span class="old-val">${escH(i.old)}</span><span class="arrow">—</span><span class="desc-val">${escH(i.new)}</span></div>`).join('');
  } else {
    rows_html=items.slice(0,6).map(i=>`<div class="issue-row"><span class="row-num">ř.&nbsp;${escH(i.row)}</span><span class="desc-val">${escH(i.name)}</span></div>`).join('');
    if(items.length>6) rows_html+=`<p class="more">... a dalších ${items.length-6} záznamů</p>`;
  }
  return `<div class="card"><div class="card-header"><span class="title">${escH(meta.label)}</span><span class="badge ${badgeCls}">${items.length}</span>${fixTag}</div>${rows_html}</div>`;
}

function renderResult(fileName, headers, rows, issues, fixedRows, sep) {
  const danger  = issues.filter(i=>i.sev==='danger');
  const warning = issues.filter(i=>i.sev==='warning');
  const grouped = {};
  issues.forEach(i=>{if(!grouped[i.type])grouped[i.type]=[];grouped[i.type].push(i);});

  const order = ['phone','dupe','shared','no-email','no-phone','platce'];
  const cardsHTML = order.filter(t=>grouped[t]).map(t=>renderGroup(t,grouped[t])).join('');

  const emptyHTML = !issues.length ? `<div class="card success-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12l2 2 4-4m6 2a9 9 0 1 1-18 0 9 9 0 0 1 18 0z" stroke-linecap="round" stroke-linejoin="round"/></svg><p>Žádné chyby nenalezeny — soubor je v pořádku.</p></div>` : '';

  const warnBox = warning.length ? `<div class="info-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" stroke-linecap="round" stroke-linejoin="round"/></svg><span>Upozornění nebyla automaticky opravena — vyžadují ruční posouzení.</span></div>` : '';

  const csvFixed = toCSV(headers, fixedRows, sep);
  const fixedName = fileName.replace(/\.csv$/i,'')+'_opraveno.csv';

  const actionBtns = danger.length ? `
    <button class="btn btn-primary" id="btn-dl">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 16v1a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-1M12 12V4m0 8-4-4m4 4 4-4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Stáhnout CSV
    </button>
    <button class="btn btn-gdrive" id="btn-gdrive">
      ${driveIconHTML()} Uložit na Google Drive
    </button>` : '';

  const el = document.getElementById('result');
  el.style.display='block';
  el.innerHTML = `
    <div class="file-name">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5.586a1 1 0 0 1 .707.293l5.414 5.414a1 1 0 0 1 .293.707V19a2 2 0 0 1-2 2z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      ${escH(fileName)}
      <span class="badge badge-neutral">${rows.length} záznamů</span>
    </div>
    <div class="stats">
      <div class="stat"><div class="num">${rows.length}</div><div class="lbl">celkem</div></div>
      <div class="stat danger"><div class="num">${danger.length}</div><div class="lbl">opraveno</div></div>
      <div class="stat warning"><div class="num">${warning.length}</div><div class="lbl">upozornění</div></div>
      <div class="stat success"><div class="num">${fixedRows.length}</div><div class="lbl">výsledek</div></div>
    </div>
    <div class="section-label">Nalezené problémy</div>
    ${cardsHTML}${emptyHTML}${warnBox}
    <div class="actions">${actionBtns}
      <button class="btn btn-secondary" id="btn-reset">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 0 0 4.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 0 1-15.357-2m15.357 2H15" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Nahrát jiný soubor
      </button>
    </div>
    <div class="drive-status" id="drive-status"></div>`;

  if(danger.length){
    document.getElementById('btn-dl').onclick = () => {
      const blob = new Blob(['\uFEFF'+csvFixed],{type:'text/csv;charset=utf-8'});
      const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:fixedName});
      a.click(); URL.revokeObjectURL(a.href);
    };
    document.getElementById('btn-gdrive').onclick = () => {
      if(!_token){ _pendingAction=()=>uploadToDrive(csvFixed,fileName); _tokenClient.requestAccessToken({prompt:''}); return; }
      uploadToDrive(csvFixed, fileName);
    };
  }

  document.getElementById('btn-reset').onclick = () => {
    el.style.display='none'; el.innerHTML='';
    document.getElementById('file-input').value='';
  };
}

/* ── File handling ── */
function handleFile(file) {
  if(!file||!file.name.toLowerCase().endsWith('.csv')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const {headers,rows,sep} = parseCSV(e.target.result);
    const {issues,fixedRows} = process(headers,rows);
    renderResult(file.name, headers, rows, issues, fixedRows, sep);
    document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});
  };
  reader.readAsText(file,'utf-8');
}

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e=>{e.preventDefault();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');handleFile(e.dataTransfer.files[0]);});
document.getElementById('file-input').addEventListener('change',e=>handleFile(e.target.files[0]));
</script>
